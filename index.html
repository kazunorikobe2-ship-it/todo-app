<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside id="project-drawer" class="project-drawer">
      <div class="drawer-header">
        <span>📁 プロジェクト</span>
        <button id="add-project-btn" class="add-project-btn" title="プロジェクトを追加">+</button>
      </div>
      <div id="project-list" class="project-list"></div>
    </aside>

    <div class="main-area">
      <header class="app-header">
        <button id="drawer-toggle-btn" class="drawer-toggle-btn" title="プロジェクト一覧の表示切替">☰</button>
        <h1 id="project-title">📋 Kanban Board</h1>
        <div class="header-right">
          <span id="user-info" class="user-info hidden"></span>
          <button id="trash-btn" class="trash-btn hidden" title="ゴミ箱">🗑️<span id="trash-count" class="trash-count hidden">0</span></button>
          <button id="logout-btn" class="logout-btn hidden">ログアウト</button>
          <button id="add-column-btn" class="add-column-btn">+ リストを追加</button>
        </div>
      </header>

      <nav class="view-tabs">
        <button class="view-tab" data-view="board">ボード</button>
        <button class="view-tab" data-view="table">テーブル</button>
        <button class="view-tab" data-view="calendar">カレンダー</button>
        <button class="view-tab" data-view="timeline">タイムライン</button>
        <button class="view-tab" data-view="dashboard">ダッシュボード</button>
      </nav>

      <main id="board" class="board view-panel"></main>
      <div id="table-view" class="view-panel hidden"></div>
      <div id="calendar-view" class="view-panel hidden"></div>
      <div id="timeline-view" class="view-panel hidden"></div>
      <div id="dashboard-view" class="view-panel hidden"></div>
    </div>
  </div>

  <!-- Googleログインモーダル（未ログインだとボードは操作不可） -->
  <div id="auth-modal" class="modal-overlay">
    <div class="modal-content small auth-content">
      <h2>ログインしてください</h2>
      <p class="modal-sub">Googleアカウントでログインすると、ボードの閲覧・編集・コメントができます</p>
      <button id="google-login-btn" class="google-btn">Googleでログイン</button>
    </div>
  </div>

  <!-- カード詳細モーダル -->
  <div id="card-modal" class="modal-overlay hidden">
    <div class="modal-content wide">
      <button id="modal-close-btn" class="modal-close-x">✕</button>

      <div class="modal-columns">
        <div class="modal-left">
          <input id="modal-title" class="modal-title-input" />

          <div class="modal-field">
            <label>開始日</label>
            <input type="date" id="modal-start-date" />
          </div>

          <div class="modal-field">
            <label>期日</label>
            <input type="date" id="modal-due-date" />
          </div>

          <div class="modal-field">
            <label>重要度</label>
            <select id="modal-priority">
              <option value="">未設定</option>
              <option value="low">低</option>
              <option value="medium">中</option>
              <option value="high">高</option>
            </select>
          </div>

          <div class="modal-field">
            <label>アサインメンバー</label>
            <div id="modal-members" class="chip-list"></div>
            <input type="text" id="modal-member-input" placeholder="名前を入力してEnter" />
          </div>

          <div class="modal-field">
            <label>備考</label>
            <textarea id="modal-notes" rows="5" placeholder="備考を入力..."></textarea>
          </div>

          <div class="modal-field">
            <label>添付ファイル</label>
            <div id="modal-attachments" class="attachment-list"></div>
            <label id="modal-attachment-label" class="file-input-label">
              📎 ファイルを選択
              <input type="file" id="modal-attachment-input" class="file-input-hidden" />
            </label>
            <div id="modal-attachment-uploading" class="upload-status hidden">
              <span class="spinner"></span>アップロード中...
            </div>
            <p class="field-hint">1ファイルあたり5MBまで</p>
          </div>
        </div>

        <div class="modal-right">
          <div class="modal-right-header">💬 コメントとアクティビティ</div>
          <div id="modal-comment-pending-file" class="pending-file hidden"></div>
          <div class="comment-input-row">
            <input type="text" id="modal-comment-input" class="comment-input-top" placeholder="コメントを入力してEnter" />
            <label class="attach-icon-btn" title="ファイルを添付">
              📎
              <input type="file" id="modal-comment-file-input" class="file-input-hidden" />
            </label>
          </div>
          <div id="modal-comments" class="comment-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 削除確認モーダル（共通） -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-content small confirm-content">
      <h2 id="confirm-modal-title">削除しますか？</h2>
      <p id="confirm-modal-message" class="modal-sub"></p>
      <div class="modal-actions">
        <button id="confirm-modal-cancel-btn" class="cancel-add">キャンセル</button>
        <button id="confirm-modal-ok-btn" class="danger-btn">削除する</button>
      </div>
    </div>
  </div>

  <!-- ゴミ箱モーダル -->
  <div id="trash-modal" class="modal-overlay hidden">
    <div class="modal-content trash-content">
      <button id="trash-close-btn" class="modal-close-x">✕</button>
      <h2>🗑️ ゴミ箱</h2>
      <p class="modal-sub">削除したカードの一覧。個別に完全削除するか、元に戻すことができます。</p>
      <div class="trash-toolbar">
        <button id="trash-empty-btn" class="danger-btn">すべて完全に削除</button>
      </div>
      <div id="trash-list" class="trash-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
